<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ping Video Search</title>
  <script>
    (function () {
      var path = window.location.pathname || "/";
      var videoIndex = path.indexOf("/video/");
      var baseHref;

      if (videoIndex >= 0) {
        baseHref = path.slice(0, videoIndex + 1);
      } else if (path.endsWith("/")) {
        baseHref = path;
      } else {
        baseHref = path.slice(0, path.lastIndexOf("/") + 1) || "/";
      }

      document.write('<base href="' + baseHref + '">');
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=5" />
</head>
<body>
  <div class="bg-shape bg-shape-a"></div>
  <div class="bg-shape bg-shape-b"></div>

  <main class="page">
    <header class="hero">
      <h1><a href="./" class="home-brand-link">Ping Video Search</a></h1>
      <p>Trova partite, atleti e momenti salienti in pochi secondi.</p>
    </header>

    <section class="search-card">
      <form id="search-form" class="search-form" autocomplete="off">
        <label class="sr-only" for="q">Cerca video</label>
        <div class="search-row">
          <div class="search-input-wrap">
            <input id="q" name="q" type="text" placeholder="Cerca per titolo, descrizione o atleta..." />
          </div>
          <button type="submit" class="search-submit-btn" aria-label="Cerca" title="Cerca">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <circle cx="11" cy="11" r="6"></circle>
              <path d="M16 16l5 5"></path>
            </svg>
          </button>
        </div>

        <div class="filters-link-row">
          <button
            id="filters-toggle-btn"
            class="filters-link-btn"
            type="button"
            aria-controls="filters-panel"
            aria-expanded="false"
          >
            Filtri avanzati
          </button>
        </div>

        <details class="filters" id="filters-panel">
          <summary class="sr-only">Filtri avanzati</summary>
          <hr class="filters-divider" />
          <div class="filters-grid">
            <div class="field">
              <label for="channel-search">Canale</label>
              <div class="channel-search-row">
                <input id="channel-search" type="search" placeholder="Cerca canale..." autocomplete="off" />
                <button
                  id="channel-toggle-btn"
                  class="channel-toggle-btn"
                  type="button"
                  aria-label="Mostra o nascondi lista canali"
                  aria-controls="channel-options"
                  aria-expanded="false"
                >
                  <span aria-hidden="true">▾</span>
                </button>
              </div>
              <p id="channel-selected-label" class="filter-selected-label">Nessun canale selezionato</p>
              <div id="channel-options" class="channel-options is-collapsed" role="group" aria-label="Seleziona uno o piu canali"></div>
            </div>

            <div class="field">
              <label for="athlete-search">Atleta</label>
              <div class="athlete-search-row">
                <input id="athlete-search" type="search" placeholder="Cerca atleta..." autocomplete="off" />
                <button
                  id="athlete-toggle-btn"
                  class="athlete-toggle-btn"
                  type="button"
                  aria-label="Mostra o nascondi lista atleti"
                  aria-controls="athlete"
                  aria-expanded="false"
                >
                  <span aria-hidden="true">▾</span>
                </button>
              </div>
              <div id="athlete" class="athlete-options is-collapsed" role="group" aria-label="Seleziona uno o piu atleti"></div>
            </div>

            <div class="field">
              <label for="date-from">Data upload da</label>
              <input id="date-from" name="dateFrom" type="date" />
            </div>

            <div class="field">
              <label for="date-to">Data upload a</label>
              <input id="date-to" name="dateTo" type="date" />
            </div>

            <div class="field">
              <label for="views-min">View min</label>
              <input id="views-min" name="viewsMin" type="number" min="0" step="1" />
            </div>

            <div class="field">
              <label for="duration-max">Durata max (secondi)</label>
              <input id="duration-max" name="durationMax" type="number" min="0" step="1" />
            </div>
          </div>

          <div class="actions-row">
            <button class="btn-secondary" type="button" id="reset-btn">Reset filtri</button>
          </div>
        </details>
      </form>
    </section>

    <section class="results-section">
      <div class="results-head">
        <h2 id="results-title">Video più recenti</h2>
        <p id="results-meta"></p>
      </div>

      <div id="status" class="status" aria-live="polite"></div>
      <ul id="results" class="results-list"></ul>
      <nav id="pagination" class="pagination hidden" aria-label="Paginazione risultati">
        <button id="page-prev" class="btn-secondary" type="button">Indietro</button>
        <div id="page-numbers" class="page-numbers"></div>
        <button id="page-next" class="btn-secondary" type="button">Avanti</button>
      </nav>
    </section>

      <section id="detail-view" class="detail-section hidden" aria-live="polite">
        <div class="detail-head">
          <button id="back-btn" class="btn-secondary" type="button">← Torna alla home</button>
          <h2 class="detail-site-title"><a href="./" class="home-brand-link">Ping Video Search</a></h2>
        </div>

      <article class="detail-card">
        <h2 id="detail-title"></h2>
        <p id="detail-channel" class="meta"></p>

        <div class="player-wrap">
          <iframe
            id="detail-player"
            title="Player video"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen
          ></iframe>
          <p id="detail-player-note" class="meta"></p>
        </div>

        <div class="detail-grid">
          <div>
            <h3>Descrizione</h3>
            <p id="detail-description" class="detail-description"></p>
          </div>
          <div>
            <h3>Dati completi</h3>
            <dl id="detail-data" class="detail-data"></dl>
          </div>
        </div>
      </article>
    </section>
  </main>

  <template id="result-item-template">
    <li class="result-item">
      <a class="thumb-wrap">
        <img class="thumb" alt="Anteprima video" loading="lazy" />
      </a>
      <div class="result-content">
        <a class="title-link"></a>
        <p class="meta"></p>
      </div>
    </li>
  </template>

  <script src="config.local.js?v=5"></script>
  <script src="script.js?v=5"></script>
</body>
</html>
